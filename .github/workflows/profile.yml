name: Profile Assets (Metrics, 3D Contrib, Snake, Pac-Man)

# Regenerates the profile README's visual assets into .github/images/ and
# commits them back. Runs daily and on demand -- intentionally NOT on push
# (the job commits to the repo, so a push trigger would loop / waste minutes).
#
# Auth model:
#   - lowlighter/metrics requires a classic PAT: it queries account-wide data
#     across the GitHub GraphQL API, which the built-in GITHUB_TOKEN cannot see.
#     METRICS_TOKEN is the ONLY long-lived secret this account manages (npm/PyPI
#     publishing is tokenless via OIDC). Keep it a CLASSIC token (fine-grained
#     PATs are unsupported by the GraphQL API), read-only, with an expiry, and
#     rotate it on that cadence.
#   - 3D-contrib and pac-man also read account data; they share METRICS_TOKEN so
#     private contributions are included.
#   - The snake generator and the commit/push step use the built-in GITHUB_TOKEN
#     (auto-injected, nothing to manage).

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

# Don't pile up scheduled runs; a new run supersedes an in-flight one.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

# Least privilege: the only write this job performs is committing the SVGs.
permissions:
  contents: write

jobs:
  build-assets:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Ensure .github/images exists
        run: mkdir -p .github/images

      - name: Generate GitHub metrics
        uses: lowlighter/metrics@65836723097537a54cd8eb90f61839426b4266b6 # v3.34
        continue-on-error: true
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: ${{ github.repository_owner }}
          template: classic
          base: activity, community, repositories, metadata
          base_indepth: yes
          config_display: large
          config_octicon: yes
          config_timezone: America/New_York
          config_twemoji: yes
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_activity: yes
          plugin_activity_days: 14
          plugin_activity_filter: all
          plugin_activity_limit: 4
          plugin_activity_load: 300
          plugin_activity_visibility: public
          plugin_fortune: yes
          plugin_habits: yes
          plugin_habits_charts_type: classic
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_languages_limit: 8
          plugin_habits_languages_threshold: 0%
          plugin_habits_trim: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_analysis_timeout_repositories: 7.5
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%
          plugin_lines: yes
          plugin_lines_history_limit: 2
          plugin_lines_repositories_limit: 4
          plugin_lines_sections: base
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_indepth: yes
          plugin_notable_repositories: yes
          plugin_notable_types: commit
          repositories_forks: yes
          output_action: none
          filename: .github/images/github-metrics.svg

      - name: Copy GitHub Metrics to .github/images
        if: always()
        run: |
          if [ -f /metrics_renders/.github/images/github-metrics.svg ]; then
            cp -v /metrics_renders/.github/images/github-metrics.svg .github/images/
          fi

      - name: Generate GitHub 3D Contributions
        uses: yoshi389111/github-profile-3d-contrib@fd54cf20784ed9a86dc7be48bb5eb1f74e92b4f8 # 0.7.1
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Copy GitHub 3D Contributions to .github/images
        if: always()
        run: |
          if compgen -G "profile-3d-contrib/*.svg" > /dev/null; then
            cp -v profile-3d-contrib/*.svg .github/images/
          fi
          rm -rf profile-3d-contrib || true

      - name: Generate GitHub Contribution Grid Snake
        uses: Platane/snk/svg-only@d8f6715049803e982ee5ff501b6b9b7d5deeb09b # v3
        continue-on-error: true
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            .github/images/github-contribution-grid-snake.svg
            .github/images/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate GitHub Contribution Grid Pac-Man
        uses: abozanona/pacman-contribution-graph@08373850c1a229b188c1e595cab37a1b15cee778 # main @ 2026-05-11
        continue-on-error: true
        with:
          github_user_name: ${{ github.repository_owner }}
          github_token: ${{ secrets.METRICS_TOKEN }}

      - name: Copy GitHub Contribution Grid Pac-Man to .github/images
        if: always()
        run: |
          if [ -f dist/pacman-contribution-graph.svg ]; then
            cp -v dist/pacman-contribution-graph.svg .github/images/github-contribution-grid-pacman.svg
          fi
          if [ -f dist/pacman-contribution-graph-dark.svg ]; then
            cp -v dist/pacman-contribution-graph-dark.svg .github/images/github-contribution-grid-pacman-dark.svg
          fi

      - name: List generated images
        if: always()
        run: ls -al .github/images || true

      - name: Commit & push updated assets
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/images/
          if git diff --cached --quiet; then
            echo "No asset changes; nothing to commit."
            exit 0
          fi
          git commit -m "chore(images): refresh profile assets [skip ci]"
          git push origin "${{ github.ref_name }}"
